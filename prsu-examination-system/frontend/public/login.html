<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PRSU Centralized Secure Examination System</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2><i class="fa-solid fa-building-columns"></i> PRSU-CSES</h2>
                <p>Secure Examination System</p>
            </div>
            <div class="auth-body">
                <div id="error-message" class="alert alert-danger" style="display: none;"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="userId">User ID</label>
                        <div style="position: relative;">
                            <i class="fa-solid fa-user" style="position: absolute; left: 10px; top: 12px; color: #6c757d;"></i>
                            <input type="text" id="userId" class="form-control" placeholder="Enter User ID" required style="padding-left: 35px;">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <div style="position: relative;">
                            <i class="fa-solid fa-lock" style="position: absolute; left: 10px; top: 12px; color: #6c757d;"></i>
                            <input type="password" id="password" class="form-control" placeholder="Enter Password" required style="padding-left: 35px;">
                        </div>
                    </div>
                    <div class="form-group d-flex justify-content-between align-items-center">
                        <div>
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" style="font-size: 0.875rem;">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" id="login-btn">
                        Sign In <i class="fa-solid fa-arrow-right ml-2"></i>
                    </button>
                </form>
            </div>
            <div class="auth-footer">
                &copy; 2024 Prof. Rajendra Singh (Rajju Bhaiya) University, Prayagraj.
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const btn = document.getElementById('login-btn');
            
            errorDiv.style.display = 'none';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';
            btn.disabled = true;

            try {
                const data = await api.auth.login({ userId, password });
                
                // Save auth info
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data));
                
                // Redirect based on role
                switch(data.role) {
                    case 'admin':
                    case 'controller':
                        window.location.href = 'controller-dashboard.html';
                        break;
                    case 'college':
                        window.location.href = 'college-dashboard.html';
                        break;
                    case 'teacher':
                        window.location.href = 'teacher-dashboard.html';
                        break;
                    default:
                        throw new Error('Unknown role');
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
                btn.innerHTML = 'Sign In <i class="fa-solid fa-arrow-right ml-2"></i>';
                btn.disabled = false;
            }
        });

        // If already logged in, redirect
        if (localStorage.getItem('token')) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (user.role === 'controller' || user.role === 'admin') window.location.href = 'controller-dashboard.html';
            else if (user.role === 'college') window.location.href = 'college-dashboard.html';
            else if (user.role === 'teacher') window.location.href = 'teacher-dashboard.html';
        }
    </script>
</body>
</html>
