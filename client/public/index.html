<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>NETprep - UGC NET Mock Test</title>

  <!-- PWA -->
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NETprep" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <!-- Prevent zoom on input focus (mobile) -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- Native App Feel CSS -->
  <style>
    /* Splash Screen */
    #splash-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #splash-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    #splash-screen .splash-icon {
      width: 100px;
      height: 100px;
      background: #3b82f6;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      animation: pulse 1.5s ease-in-out infinite;
      box-shadow: 0 20px 60px rgba(59, 130, 246, 0.4);
    }

    #splash-screen .splash-icon span {
      color: white;
      font-size: 48px;
      font-weight: 800;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #splash-screen .splash-title {
      color: white;
      font-size: 28px;
      font-weight: 700;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin-bottom: 8px;
    }

    #splash-screen .splash-subtitle {
      color: #94a3b8;
      font-size: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #splash-screen .splash-loader {
      margin-top: 40px;
      width: 40px;
      height: 40px;
      border: 3px solid rgba(59, 130, 246, 0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Native App Behaviors */
    * {
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
    }

    html {
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    body {
      margin: 0;
      padding: 0;
      overscroll-behavior-y: contain;
      -webkit-user-select: none;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Allow text selection in content areas */
    input, textarea, [contenteditable], .selectable,
    p, span, h1, h2, h3, h4, h5, h6, li, td, th, label {
      -webkit-user-select: text;
      user-select: text;
    }

    /* Disable pull to refresh */
    body {
      overscroll-behavior-y: contain;
    }

    /* Safe area for notched phones */
    #root {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* Smooth scrolling */
    * {
      scroll-behavior: smooth;
    }

    /* Disable context menu on long press */
    img, a {
      -webkit-touch-callout: none;
    }

    /* Button press effect */
    button, a, [role="button"] {
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    button:active, a:active, [role="button"]:active {
      transform: scale(0.97);
      opacity: 0.8;
    }

    /* Prevent text size adjust on orientation change */
    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    /* Hide scrollbar but keep scrolling */
    ::-webkit-scrollbar {
      width: 0;
      height: 0;
      display: none;
    }

    /* Status bar area background */
    @supports (padding-top: env(safe-area-inset-top)) {
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top);
        background: #3b82f6;
        z-index: 99998;
      }
    }
  </style>

  <!-- Your Vite build files (already here) -->
  <script type="module" crossorigin src="/assets/index-xxxxx.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-xxxxx.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen">
    <div class="splash-icon">
      <span>N</span>
    </div>
    <div class="splash-title">NETprep</div>
    <div class="splash-subtitle">UGC NET Mock Test</div>
    <div class="splash-loader"></div>
  </div>

  <!-- React App -->
  <div id="root"></div>

  <script>
    // Hide splash screen when app loads
    function hideSplash() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() {
          splash.remove();
        }, 600);
      }
    }

    // Hide splash after React renders or timeout
    var splashTimer = setTimeout(hideSplash, 4000);

    // Watch for React root to have content
    var observer = new MutationObserver(function(mutations) {
      var root = document.getElementById('root');
      if (root && root.children.length > 0) {
        clearTimeout(splashTimer);
        setTimeout(hideSplash, 500);
        observer.disconnect();
      }
    });

    observer.observe(document.getElementById('root'), {
      childList: true,
      subtree: true
    });

    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js');
      });
    }

    // Disable double-tap zoom
    var lastTouchEnd = 0;
    document.addEventListener('touchend', function(event) {
      var now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);

    // Disable pinch zoom
    document.addEventListener('gesturestart', function(e) {
      e.preventDefault();
    });

    // Handle back button (prevent exit on first press)
    var backPressCount = 0;
    window.addEventListener('popstate', function(e) {
      if (window.location.pathname === '/' || window.location.pathname === '') {
        backPressCount++;
        if (backPressCount === 1) {
          window.history.pushState(null, '', window.location.href);
          // You could show a toast here: "Press back again to exit"
          setTimeout(function() { backPressCount = 0; }, 2000);
        }
      }
    });
    window.history.pushState(null, '', window.location.href);
  </script>
</body>
</html>
