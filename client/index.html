<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Primary Meta Tags -->
    <title>NETprep - UGC NET Mock Test</title>
    <meta name="title" content="NETprep - UGC NET Mock Test" />
    <meta name="description" content="UGC NET Mock Test Application for Paper 1 & Paper 2 (History). Practice with smart question bank, DI questions, and NTA pattern tests." />
    <meta name="keywords" content="UGC NET, Mock Test, Paper 1, Paper 2, History, NTA, Exam Preparation" />
    <meta name="author" content="NETprep" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#2563eb" />
    <meta name="msapplication-TileColor" content="#2563eb" />
    
    <!-- Language & Encoding -->
    <meta http-equiv="Content-Language" content="hi" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- PWA Meta Tags -->
    <meta name="application-name" content="NETprep" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NETprep" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileImage" content="/icons/icon-144.png" />
    <meta name="msapplication-config" content="none" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Favicon & Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-72.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-72.png" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-192.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Font Performance: Preconnect & DNS Prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Google Fonts: Inter (English UI Font) - Weights: 300, 400, 500, 600, 700, 800, 900 -->
    <!-- For optimal performance with display=swap, fonts load asynchronously -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Google Fonts: Noto Sans Devanagari (Hindi/Devanagari Script) - Weights: 300, 400, 500, 600, 700, 800, 900 -->
    <!-- Essential for proper Hindi text rendering with correct metrics and ligatures -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    
    <!-- Prevent Flash Of Unstyled Content (FOUC) -->
    <!-- This ensures smooth font loading without layout shift (CLS = 0) -->
    <style>
      html {
        font-family: 'Inter', 'Noto Sans Devanagari', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
    </style>
  </head>
  <body class="bg-secondary-900 text-secondary-100">
    <!-- Main React App Root -->
    <div id="root"></div>
    
    <!-- Vite Runtime -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
